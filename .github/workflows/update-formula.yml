name: Update Homebrew Formula

on:
  push:
    tags:
      - "*"

jobs:
  update_formula_version:
    name: Update homebrew-core formula on push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set source tarball SHA 256
        id: shasum-src
        run: |
          url="https://github.com/joshOberhaus/brightness/archive/refs/tags/${{ steps.get_version.outputs.version }}.tar.gz"
          curl -L "$url" -o brightness.tar.gz
          echo "sha=$(shasum -a 256 brightness.tar.gz | awk '{printf $1}')" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-core fork
        run: |
          git clone --filter=blob:none --no-checkout https://x-access-token:${{ secrets.COMMIT_TOKEN }}@github.com/joshOberhaus/homebrew-core.git
          cd homebrew-core
          git sparse-checkout init --cone
          git sparse-checkout set Formula/b/brightness.rb
          git checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update brightness formula
        run: |
          cd homebrew-core
          VERSION="${{ steps.get_version.outputs.version }}"
          SHA="${{ steps.shasum-src.outputs.sha }}"
          
          # Update version, url, and sha256 in the formula
          sed -i 's|url "https://github.com/joshOberhaus/brightness/archive/refs/tags/[^"]*"|url "https://github.com/joshOberhaus/brightness/archive/refs/tags/'"$VERSION"'.tar.gz"|' Formula/b/brightness.rb
          sed -i 's|sha256 "[^"]*"|sha256 "'"$SHA"'"|' Formula/b/brightness.rb
          
          # Commit and push
          git add Formula/b/brightness.rb
          git commit -m "brightness: update to $VERSION"
          git push